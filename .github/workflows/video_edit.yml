name: Video Editor

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'Video ID'
        required: true
      title:
        description: 'Video Title'
        required: true
      voiceover:
        description: 'Voiceover URL'
        required: true
      music_url:
        description: 'Music URL'
        required: true
      selected_topic:
        description: 'Selected Topic'
        required: true
      clips:
        description: 'Clips JSON'
        required: true

jobs:
  edit-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      - name: Run Video Edit Script
        run: |
          chmod +x scripts/edit.sh
          bash scripts/edit.sh

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          filename: output/final_video.mp4
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          overwrite: "true"
