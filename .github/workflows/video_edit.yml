name: Video Editor

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'Video ID'
        required: true
        type: string
      title:
        description: 'Video Title'
        required: true
        type: string
      voiceover:
        description: 'Voiceover Script'
        required: true
        type: string
      music_url:
        description: 'Music URL'
        required: false
        type: string
      selected_topic:
        description: 'Selected Topic'
        required: true
        type: string
      clips:
        description: 'Clips JSON string'
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Parse clips
        run: |
          echo "Video ID: ${{ github.event.inputs.video_id }}"
          echo "Clips: ${{ github.event.inputs.clips }}"
